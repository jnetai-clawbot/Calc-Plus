name: Build Calc-Plus APK

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'changes.txt'
      - 'usage-instructions.txt'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.CALCPLUS_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding existing keystore..."
            echo "$KEYSTORE_BASE64" | base64 -d > app/calcplus-release-keystore.jks
          else
            echo "Creating new keystore..."
            keytool -genkey -v \
              -keystore app/calcplus-release-keystore.jks \
              -alias calcplus \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -dname "CN=jnetai.com, OU=CalcPlus, O=jnetai, L=Unknown, ST=Unknown, C=UK"
            echo "NEW_KEYSTORE_BASE64=$(base64 -w0 app/calcplus-release-keystore.jks)" >> $GITHUB_ENV
          fi

      - name: Save new keystore as secret
        if: env.NEW_KEYSTORE_BASE64 != ''
        uses: gliech/create-github-secret-action@v1
        with:
          name: CALCPLUS_KEYSTORE_BASE64
          value: ${{ env.NEW_KEYSTORE_BASE64 }}
          pa_token: ${{ secrets.GH_PAT }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || true

      - name: Build with Gradle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.5
          fi
          ./gradlew assembleRelease --no-daemon

      - name: Find APK
        id: find_apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK found at: $APK_PATH"

      - name: Copy APK to output
        run: |
          mkdir -p apk
          cp $APK_PATH apk/Calc-Plus.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calc-Plus
          path: apk/Calc-Plus.apk

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Calc-Plus v${{ env.VERSION }}
          body: |
            ## Calc-Plus v${{ env.VERSION }}

            A secure calculator with hidden encrypted vault storage.

            ### Features
            - Full calculator functionality
            - Hidden encrypted vault for files, folders, and notes
            - PIN-protected access with self-destruct on failed attempts
            - Encrypted backup and restore
            - Import/export files between OS storage and vault
            - Search functionality
            - File operations (move, copy, delete, rename)
            - Google Drive and OneDrive backup support
            - Share backup via any app

            Made by [jnetai.com](https://jnetai.com)
          files: apk/Calc-Plus.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/Calc-Plus.apk
          git commit -m "Release v${{ env.VERSION }}: Calc-Plus.apk" || echo "No changes to commit"
          git push || echo "Push failed, continuing"
